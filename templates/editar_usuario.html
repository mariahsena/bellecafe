<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Editar Usuário</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>
    <nav>

        <h2>Bélle Café</h2>

        <div>

            <a href="/dashboard">Dashboard</a>

            <a href="/produtos">Produtos</a>

            <a href="/clientes">Clientes</a>

            <a href="/vendas">Vendas</a>

            <a href="/usuarios">Usuários</a>

            <a href="/logout">Sair</a>

        </div>

    </nav>

    <div class="container">

        <h1>Editar Usuário</h1>

        <form method="POST" action="/usuarios/atualizar/{{ usuario[0] }}">

            <input name="nome" value="{{ usuario[1] }}">

            <input name="email" value="{{ usuario[2] }}">

            <input name="senha" value="{{ usuario[3] }}">

            <button>Atualizar</button>

        </form>

    </div>

    <footer>

        <p>Bélle Café - © 2026</p>

    </footer>

</body>

</html>
